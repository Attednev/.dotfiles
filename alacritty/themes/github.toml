
[colors]
  # Default colors
  [colors.primary]
    background = '#0a0c10' # canvas.default
    foreground = '#f0f3f6' # fg.default

  # Cursor colors
  [colors.cursor]
    text = '#0a0c10' # fg.on_emphasis (or fg.default if preferred)
    cursor = '#409eff' # accent.emphasis

  # Normal colors
  [colors.normal]
    black =   '#0a0c10' # black.base
    red =     '#ff9492' # red.base
    green =   '#26cd4d' # green.base
    yellow =  '#f0b72f' # yellow.base
    blue =    '#71b7ff' # blue.base
    magenta = '#cb9eff' # magenta.base
    cyan =    '#76e3ea' # cyan.base
    white =   '#d9dee3' # white.base

  # Bright colors
  [colors.bright]
    black =   '#272b33' # black.bright
    red =     '#ffb1af' # red.bright
    green =   '#4ae168' # green.bright
    yellow =  '#f7c843' # yellow.bright
    blue =    '#91cbff' # blue.bright
    magenta = '#dbb7ff' # magenta.bright
    cyan =    '#b3f0ff' # cyan.bright
    white =   '#d9dee3' # white.bright

  # Dim colors (optional, using muted tones)
  [colors.dim]
    black =   '#14171b' # neutral.subtle
    red =     '#2e1619' # danger.subtle
    green =   '#0f2218' # success.subtle
    yellow =  '#251d0f' # attention.subtle
    blue =    '#111f34' # accent.subtle
    magenta = '#211b33' # done.subtle
    cyan =    '#272b33' # canvas.subtle (no specific cyan subtle)
    white =   '#9ea7b3' # fg.subtle

  # Selection colors
  [colors.selection]
#text = '#0a0c10' # fg.on_emphasis
# background = '#409eff' # accent.emphasis
    text = '#f0f3f6' # fg.on_emphasis
    background = '#1A3959' # accent.emphasis

  # Search colors
  [colors.search]
    [colors.search.matches]
      foreground = '#0a0c10' # fg.on_emphasis
      background = '#e09b13' # attention.emphasis
    [colors.search.focused_match]
      foreground = '#0a0c10' # fg.on_emphasis
      background = '#09b43a' # success.emphasis

  # Hints colors
  [colors.hints]
    [colors.hints.start]
      foreground = '#0a0c10' # fg.on_emphasis
      background = '#e09b13' # attention.emphasis
    [colors.hints.end]
      foreground = '#0a0c10' # fg.on_emphasis
      background = '#409eff' # accent.emphasis

  # Line indicator
  [colors.line_indicator]
    foreground = '#7a828e' # border.muted
    background = '#272b33' # canvas.overlay

  # Footer bar
  [colors.footer_bar]
    background = '#272b33' # canvas.overlay
    foreground = '#f0f3f6' # fg.default


